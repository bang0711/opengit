name: Release

# Build installers for all three OSes (Tauri) and publish them to a GitHub
# Release. Trigger by pushing a version tag:  git tag v1.1.0 && git push origin v1.1.0
# (bump "version" in package.json, src-tauri/tauri.conf.json and src-tauri/Cargo.toml
# to match first — `bun run release` cuts the tag from package.json's version).
on:
  push:
    tags:
    - "v*"

jobs:
  # Gate: renderer typecheck + tests, plus the Rust backend tests.
  test:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - uses: oven-sh/setup-bun@v2
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: "src-tauri -> target"
    - name: Install Linux deps for Tauri
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev
    - run: bun install --frozen-lockfile
    - run: bun run typecheck
    - run: bun run test
    - name: Rust tests
      run: cargo test --manifest-path src-tauri/Cargo.toml

  release:
    needs: test # only build/publish if tests passed
    permissions:
      contents: write # tauri-action creates/uploads the release
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, macos-latest, ubuntu-22.04 ]
    runs-on: ${{ matrix.os }}
    env:
      # secrets can't be used in `if:` directly — collapse to a boolean string here.
      SIGN_WINDOWS: ${{ secrets.WINDOWS_CERTIFICATE != '' }}
    steps:
    - uses: actions/checkout@v4

    - uses: oven-sh/setup-bun@v2

    - uses: dtolnay/rust-toolchain@stable

    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: "src-tauri -> target"

    - name: Install Linux deps for Tauri
      if: matrix.os == 'ubuntu-22.04'
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev

    - name: Install dependencies
      run: bun install --frozen-lockfile

    # Stamp the build with the tag's version. The tag is the single source of
    # truth — this prevents a config/tag desync from shipping a wrongly-versioned
    # installer (which makes the updater re-offer the same "update" forever and
    # turns each update into a broken same-version reinstall).
    - name: Sync version to tag
      shell: bash
      run: |
        v="${{ github.ref_name }}"; v="${v#v}"
        node scripts/set-version.mjs "$v"

    # Code-sign the Windows build (skipped automatically if WINDOWS_CERTIFICATE
    # secret is unset). Imports the base64 PFX, then injects its thumbprint +
    # timestamp settings into tauri.conf.json so tauri's bundler signs the exe
    # and NSIS installer. signtool ships with the windows-latest runner.
    - name: Sign Windows build
      if: runner.os == 'Windows' && env.SIGN_WINDOWS == 'true'
      shell: pwsh
      env:
        WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
        WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      run: |
        $pfx = "$env:RUNNER_TEMP\cert.pfx"
        [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
        $pw = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
        $cert = Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $pw
        $conf = "src-tauri/tauri.conf.json"
        $j = Get-Content $conf -Raw | ConvertFrom-Json
        $j.bundle.windows | Add-Member -Force certificateThumbprint $cert.Thumbprint
        $j.bundle.windows | Add-Member -Force digestAlgorithm "sha256"
        $j.bundle.windows | Add-Member -Force timestampUrl "http://timestamp.digicert.com"
        $j | ConvertTo-Json -Depth 100 | Set-Content $conf

    - name: Build & upload installers
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Provider OAuth config baked into the binary at build time so released
        # installers ship with one-click login. Client ids/tenant are public
        # (Actions *variables*). Unset ones bake empty → paste-a-token fallback.
        OPENGIT_GH_CLIENT_ID: ${{ vars.OPENGIT_GH_CLIENT_ID }}
        OPENGIT_GITLAB_CLIENT_ID: ${{ vars.OPENGIT_GITLAB_CLIENT_ID }}
        OPENGIT_AZURE_CLIENT_ID: ${{ vars.OPENGIT_AZURE_CLIENT_ID }}
        OPENGIT_AZURE_TENANT: ${{ vars.OPENGIT_AZURE_TENANT }}
      with:
        # Use bun to drive the Tauri CLI (matches local scripts).
        tauriScript: bun run tauri
        tagName: ${{ github.ref_name }}
        releaseName: "OpenGit ${{ github.ref_name }}"
        releaseDraft: true
        prerelease: false

    # Portable Windows build: the raw exe runs without installing (nothing added
    # to Start menu / Search). Upload it alongside the NSIS installer.
    - name: Upload portable EXE (Windows)
      if: matrix.os == 'windows-latest'
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        v="${{ github.ref_name }}"; v="${v#v}"
        cp "src-tauri/target/release/opengit.exe" "OpenGit-${v}-portable.exe"
        gh release upload "${{ github.ref_name }}" "OpenGit-${v}-portable.exe" --clobber

  # Flip the draft release to published only after ALL OS builds have uploaded,
  # so users never see a partial release.
  publish:
    needs: release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
    - env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: >
        gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false --latest
